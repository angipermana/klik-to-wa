<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - LeadFlow WA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
  
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-800">Admin Dashboard</h1>
      <p class="text-gray-500 text-sm mt-1">Silakan masuk untuk melanjutkan</p>
    </div>

    <form id="loginForm" class="space-y-5">
      <div id="errorBox" class="hidden text-sm text-red-600 bg-red-50 p-3 rounded-lg border border-red-100 text-center">
        Username atau Password salah.
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" id="username" required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="password" required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
      </div>

      <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors mt-2">
        Masuk
      </button>
    </form>
  </div>

  <script>
    // Check if already authenticated
    fetch('/api/me').then(res => res.json()).then(data => {
      if (data.authenticated) {
        window.location.href = '/admin/dashboard.html';
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      const errBox = document.getElementById('errorBox');

      btn.disabled = true;
      btn.textContent = 'Memproses...';
      errBox.classList.add('hidden');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass })
        });
        
        const data = await res.json();
        if (res.ok && data.success) {
          window.location.href = '/admin/dashboard.html';
        } else {
          errBox.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'Masuk';
        }
      } catch (err) {
        errBox.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Masuk';
      }
    });
  </script>
</body>
</html>
